
<button (click)="handleClick()" >Click Event</button>
<br>
<br>
<input type="text" (input)="onTyping($event)" placeholder="input event">
<br>
<br>
<input type="text" placeholder="key up" (keyup)="onKeyUp($event)" >

<br>
<div (mouseover)="onHover()" (mouseleave)="onMouseLeave()" class="hover-box" >Hover Text</div>
<br>
<br>
<input type="text" placeholder="Blur and Focus" (blur)="onBlur()" (focus)="onFocus()">
